name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  jar:
    name: Build Jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build app and shaded jar
        run: ./gradlew build shadowJar

      - name: Upload shaded jar
        uses: actions/upload-artifact@v7
        with:
          name: hackernews-cli-jar
          path: build/libs/hackernews-cli-*-all.jar

  native:
    name: Native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build native image
        run: ./gradlew nativeCompile

      - name: Stage native artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/native/nativeCompile/hackernews-cli "dist/hackernews-cli-${{ runner.os }}-${{ runner.arch }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: hackernews-cli-native-${{ matrix.os }}
          path: dist/*
